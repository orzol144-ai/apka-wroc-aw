<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Planer dnia</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
}

.box {
  width:95%;
  max-width:400px;
  background:white;
  margin-top:20px;
  border-radius:20px;
  padding:20px;
}

.card {
  background:#f5f5f5;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#667eea;
  color:white;
  font-weight:bold;
}

.actions {
  display:flex;
  gap:10px;
}

.actions button {
  flex:1;
}

.map-btn {
  background:#333;
}
</style>
</head>

<body>

<div class="box">
<h2>📍 Plan dnia</h2>

<select id="styl">
  <option>leniwy</option>
  <option>aktywny</option>
</select>

<select id="transport">
  <option value="pieszo">🚶 pieszo</option>
  <option value="komunikacja">🚋 komunikacja</option>
  <option value="auto">🚗 auto</option>
</select>

<button onclick="start()">🚀 Start</button>

<div id="app"></div>
</div>

<script>
let data = {};
let sloty = ["kawa","jedzenie","spacer","atrakcja"];
let currentSlot = 0;
let index = 0;
let wybrane = [];

async function start() {
  const styl = document.getElementById("styl").value;
  const transport = document.getElementById("transport").value;

  const res = await fetch("/plan", {
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({ styl, transport })
  });

  data = await res.json();

  currentSlot = 0;
  index = 0;
  wybrane = [];

  pokaz();
}

function pokaz() {
  const app = document.getElementById("app");

  if(currentSlot >= sloty.length){
    pokazPodsumowanie();
    return;
  }

  const slot = sloty[currentSlot];
  const item = data[slot][index];

  app.innerHTML = `
    <h3>${slot.toUpperCase()}</h3>

    <div class="card">
      <b>${item.name}</b><br><br>
      ${item.opis}<br><br>
      🚀 ${item.dojazd}
    </div>

    <button class="map-btn" onclick="mapa('${item.mapy}')">📍 Mapy</button>

    <div class="actions">
      <button onclick="next()">❌</button>
      <button onclick="choose()">👍</button>
    </div>
  `;
}

function next(){
  index++;
  pokaz();
}

function choose(){
  const slot = sloty[currentSlot];
  wybrane.push(data[slot][index]);
  currentSlot++;
  index = 0;
  pokaz();
}

function mapa(link){
  window.open(link,"_blank");
}

function pokazPodsumowanie(){
  const app = document.getElementById("app");

  app.innerHTML = "<h3>Twój plan:</h3>";

  wybrane.forEach(x=>{
    app.innerHTML += `
      <div class="card">
        <b>${x.name}</b><br>
        ${x.opis}
      </div>
    `;
  });
}
</script>

</body>
</html>
