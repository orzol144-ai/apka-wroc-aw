<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Planer dnia</title>

  <style>
    body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* kontener jak appka */
.box {
  background: rgba(255,255,255,0.9);
backdrop-filter: blur(10px);
  width: 90%;
  max-width: 400px;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  text-align: center;
}

/* tytuł */
h2 {
  margin-bottom: 20px;
}

/* select + button */
select, button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

/* select */
select {
  background: #f1f1f1;
}

/* button */
button {
  background: #667eea;
  color: white;
  font-weight: bold;
  transition: 0.2s;
}

.item {
  background: white;
  margin: 10px 0;
  padding: 14px;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  transition: 0.2s;
  font-size: 14px;
}

.item:hover {
  transform: scale(1.03);
}

.loading {
  color: #00ffd5;
  font-weight: bold;
}

#wynik {
  margin-top: 20px;
  text-align: left;
  background: #f7f7f7;
  padding: 15px;
  border-radius: 12px;
  min-height: 80px;
  line-height: 1.5;
  white-space: pre-line;
}

/* efekt kliknięcia */
button:active {
  transform: scale(0.97);
}
/* hover */
button:hover {
  background: #5563d1;
  transform: scale(1.03);
}

/* wynik */
#wynik {
  margin-top: 20px;
  text-align: left;
  background: #f7f7f7;
  padding: 15px;
  border-radius: 12px;
  min-height: 80px;
}

/* loading animacja */
.loading {
  animation: blink 1s infinite;
}

@keyframes blink {
  0% {opacity: 1;}
  50% {opacity: 0.3;}
  100% {opacity: 1;}
}
.item {
  animation: fadeIn 0.4s ease forwards;
  opacity: 0;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
@media (max-width: 600px) {

  body {
    padding: 10px;
  }

  .box {
    width: 100%;
    padding: 15px;
    border-radius: 16px;
  }

  h2 {
    font-size: 20px;
    text-align: center;
  }

  select, button {
    width: 100%;
    font-size: 16px;
  }
  </style>
</head>

<body>

<div class="box">
  <h2>📍 Plan dnia – Wrocław</h2>

  <p class="subtitle">Wybierz klimat dnia 👇</p>

  <select id="styl">
    <option value="leniwy">😴 Leniwy</option>
    <option value="aktywny">🏃 Aktywny</option>
    <option value="romantyczny">❤️ Romantyczny</option>
  </select>

  <button onclick="ulozDzien()">🚀 Ułóż mi dzień</button>

  <div id="wynik"></div>
</div>

<script>
async function ulozDzien() {
  const styl = document.getElementById("styl").value;
  const wynik = document.getElementById("wynik");

  wynik.innerHTML = '<span class="loading">⏳ Generuję plan...</span>';

  try {
    const res = await fetch("https://apka-wroc-aw-1.onrender.com/plan", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ styl: styl })
    });

    const data = await res.json();

    console.log("ODPOWIEDŹ:", data);

const linie = data.wynik.split('\n');
let html = '';
let poprzedniaGodzina = '';
let licznik = 0;

linie.forEach((linia) => {
  linia = linia.trim();

  if (linia === '') return;

  if (linia.match(/^\d{1,2}:\d{2}/)) {
    poprzedniaGodzina = linia;
  } else {
    html += `<div class="item" style="animation-delay: ${licznik * 0.15}s">
      ⏰ ${poprzedniaGodzina}<br>
      📍 ${linia}
    </div>`;

    licznik++;
  }
});

wynik.innerHTML = html;
  } catch (err) {
    console.log("BŁĄD:", err);
    wynik.innerText = "❌ Błąd połączenia";
  }
}
</script>
