<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#667eea">

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
}

.box {
  background: white;
  margin-top: 20px;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

select, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
}

button {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-weight: bold;
}

#wynik {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.item {
  background: #f5f5f5;
  padding: 14px;
  border-radius: 12px;
  animation: fadeIn 0.4s ease forwards;
  opacity: 0;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

.loading {
  font-weight: bold;
  color: #667eea;
}

a {
  color: #667eea;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>📍 Plan dnia – Wrocław</h2>

  <select id="styl">
    <option value="leniwy">😴 Leniwy</option>
    <option value="aktywny">🏃 Aktywny</option>
    <option value="romantyczny">❤️ Romantyczny</option>
  </select>

  <button onclick="ulozDzien()">🚀 Ułóż mi dzień</button>

  <div id="wynik"></div>
</div>

<script>
async function ulozDzien() {
  const styl = document.getElementById("styl").value;
  const wynik = document.getElementById("wynik");

  wynik.innerHTML = "⏳ Generuję plan...";

  try {
    const res = await fetch("https://apka-wroc-aw-1.onrender.com/plan", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ styl })
    });

    const data = await res.json();

    const linie = data.wynik.split("\n");
    let html = "";
    let godzina = "";

    linie.forEach((linia, i) => {
      linia = linia.trim();
      if (!linia) return;

      if (linia.match(/^\d{1,2}:\d{2}/)) {
        godzina = linia;
      } else {

        const mapLink = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(linia);

        html += `
        <div class="item" style="animation-delay:${i*0.1}s">
          <strong>${godzina}</strong><br>
          📍 ${linia}<br>
          <a href="${mapLink}" target="_blank">➡️ Otwórz w Google Maps</a>
        </div>`;
      }
    });

    wynik.innerHTML = html;

  } catch (err) {
    wynik.innerText = "❌ Błąd połączenia";
  }
}
</script>

</body>
</html>
