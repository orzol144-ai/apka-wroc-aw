<h1>DZIAŁA FRONT</h1>
<script>

let list = [];
let index = 0;
let finalPlan = [];
let weatherData = null;

async function start() {
  try {
    const styl = document.getElementById("styl").value;

    document.getElementById("app").innerHTML = "⏳ Generuję...";

    const res = await fetch("/plan", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ styl })
    });

    const data = await res.json();

    if (!data.list || !data.list.length) {
      document.getElementById("app").innerHTML = "❌ Brak planu";
      return;
    }

    list = data.list;
    index = 0;
    finalPlan = [];
    weatherData = data.weather;

    render();

  } catch (err) {
    console.error(err);
    document.getElementById("app").innerHTML = "❌ Błąd połączenia";
  }
}

function render() {
  const app = document.getElementById("app");

  if (index >= list.length) {
    return showFinal();
  }

  const item = list[index];

  const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.miejsce)}`;

  app.innerHTML = `
    <div class="weather">
      🌦️ ${weatherData?.temp ?? "?"}°C
    </div>

    <div class="card">
      <h3>${item.miejsce}</h3>
      <p>${item.opis}</p>

      <a class="map-link" href="${mapUrl}" target="_blank">
        📍 Otwórz w Google Maps
      </a>

      <div class="actions">
        <button onclick="reject()">👎</button>
        <button onclick="accept()">👍</button>
      </div>
    </div>
  `;
}

function accept() {
  finalPlan.push(list[index]);
  index++;
  render();
}

function reject() {
  index++;
  render();
}

function showFinal() {
  let html = `
    <div class="weather">
      🌦️ ${weatherData?.temp ?? "?"}°C
    </div>

    <h3>🔥 Twój plan dnia</h3>
  `;

  let hour = 10;

  finalPlan.forEach(item => {
    const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.miejsce)}`;

    html += `
      <div class="card">
        <h4>${hour}:00 — ${item.miejsce}</h4>
        <p>${item.opis}</p>
        <a class="map-link" href="${mapUrl}" target="_blank">
          📍 Otwórz w Google Maps
        </a>
      </div>
    `;

    hour += 2;
  });

  if (!finalPlan.length) {
    html += "<p>❌ Nic nie wybrałeś</p>";
  }

  document.getElementById("app").innerHTML = html;
}

</script>
