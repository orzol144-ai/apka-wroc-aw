<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#667eea">

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* kontener */
.box {
  background: rgba(255,255,255,0.95);
  width: 90%;
  max-width: 400px;
  margin-top: 20px;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  text-align: center;
}

/* select + button */
select, button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  font-size: 15px;
}

button {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-weight: bold;
}

/* wynik */
#wynik {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* kafelki */
.item {
  background: #f7f7f7;
  padding: 14px;
  border-radius: 12px;
  text-align: left;
  opacity: 0;
  animation: fadeIn 0.4s ease forwards;
}

/* animacja */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* loading */
.loading {
  font-weight: bold;
  color: #667eea;
}
</style>
</head>

<body>

<div class="box">
  <h2>📍 Plan dnia – Wrocław</h2>

  <select id="styl">
    <option value="leniwy">😴 Leniwy</option>
    <option value="aktywny">🏃 Aktywny</option>
    <option value="romantyczny">❤️ Romantyczny</option>
  </select>

  <button onclick="ulozDzien()">🚀 Ułóż mi dzień</button>

  <div id="wynik"></div>
</div>

<script>
async function ulozDzien() {
  const styl = document.getElementById("styl").value;
  const wynik = document.getElementById("wynik");

  wynik.innerHTML = '<span class="loading">⏳ Generuję plan...</span>';

  try {
    const res = await fetch("https://apka-wroc-aw-1.onrender.com/plan", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ styl: styl })
    });

    const data = await res.json();

    console.log("ODPOWIEDŹ:", data);

    const linie = data.wynik.split("\n");
    let html = "";
    let poprzedniaGodzina = "";

    linie.forEach((linia, i) => {
      linia = linia.trim();
      if (linia === "") return;

      if (linia.match(/^\d{1,2}:\d{2}/)) {
        poprzedniaGodzina = linia;
      } else {
        html += `
        <div class="item" style="animation-delay:${i * 0.15}s">
          <strong>${poprzedniaGodzina}</strong><br>
          ${linia}
        </div>`;
      }
    });

    wynik.innerHTML = html;

  } catch (err) {
    console.log("BŁĄD:", err);
    wynik.innerText = "❌ Błąd połączenia";
  }
}
</script>

</body>
</html>
