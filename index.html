<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Planer dnia</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
}

.box {
  background: white;
  margin-top: 40px;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

button, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #667eea;
  color: white;
}

#wynik {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="box">
  <h2>📍 Plan dnia – Wrocław</h2>

  <select id="styl">
    <option value="leniwy">😴 Leniwy</option>
    <option value="aktywny">🏃 Aktywny</option>
    <option value="romantyczny">❤️ Romantyczny</option>
  </select>

  <button onclick="ulozDzien()">🚀 Ułóż mi dzień</button>

  <div id="wynik"></div>
</div>

<script>
async function ulozDzien() {
  const styl = document.getElementById("styl").value;
  const wynik = document.getElementById("wynik");

  wynik.innerText = "⏳ Generuję...";

  try {
    const res = await fetch("https://apka-wroc-aw-1.onrender.com/plan", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ styl: styl })
    });

    const data = await res.json();

    console.log("ODPOWIEDŹ:", data);

    // 🔥 NAJPROSTSZA WERSJA
    wynik.innerText = data.wynik;

  } catch (err) {
    console.log("BŁĄD:", err);
    wynik.innerText = "❌ Błąd połączenia";
  }
}
</script>

</body>
</html>
