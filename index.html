<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1e1e2f,#3a2f63);
  color:white;
  display:flex;
  justify-content:center;
}

.box {
  width:95%;
  max-width:420px;
  margin-top:20px;
  background:#1f1f2e;
  padding:20px;
  border-radius:20px;
}

button, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button {
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

.quick {
  display:flex;
  gap:10px;
}

.card {
  background:#2a2a3a;
  padding:15px;
  margin-top:15px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="box">

<h2>📍 Plan dnia</h2>

<select id="styl">
<option value="leniwy">😴 Leniwy</option>
<option value="aktywny">🏃 Aktywny</option>
<option value="romantyczny">❤️ Romantyczny</option>
</select>

<select id="transport">
<option value="pieszo">🚶 Pieszo</option>
<option value="komunikacja">🚋 Komunikacja</option>
<option value="auto">🚗 Auto</option>
</select>

<button onclick="start()">🚀 Start</button>

<div class="quick">
<button onclick="glodny()">🍔 Głodny</button>
<button onclick="zmeczony()">😴 Odpoczynek</button>
</div>

<div id="app"></div>

</div>

<script>
let data = {};
let tryb = "plan"; // 🔥 ważne

async function start(){
  tryb = "plan";

  const styl = stylEl.value;
  const transport = transportEl.value;

  app.innerHTML = "⏳ Generuję...";

  const res = await fetch("/plan",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ styl, transport })
  });

  data = await res.json();

  pokazPlan();
}

// 🔥 RESET zamiast nakładania
function glodny(){
  tryb = "food";
  pokazListe("jedzenie");
}

function zmeczony(){
  tryb = "chill";
  pokazListe("spacer");
}

// 🔥 lista zamiast swipe (czytelniej)
function pokazListe(kategoria){
  app.innerHTML = `<h3>${kategoria}</h3>`;

  const lista = data[kategoria] || [];

  lista.forEach(item=>{
    const map = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.name)}`;

    app.innerHTML += `
      <div class="card">
        <b>${item.time} – ${item.name}</b><br><br>
        ${item.opis}<br><br>
        🚀 ${item.dojazd}<br><br>
        <a href="${map}" target="_blank">📍 Mapy</a>
      </div>
    `;
  });
}

// 🔥 FINALNY PLAN (bez duplikatów)
function pokazPlan(){
  app.innerHTML = "<h3>🔥 Plan dnia</h3>";

  ["kawa","spacer","jedzenie","atrakcja"].forEach(k=>{
    if(data[k] && data[k][0]){
      const item = data[k][0];

      const map = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.name)}`;

      app.innerHTML += `
        <div class="card">
          <b>${item.time} – ${item.name}</b><br><br>
          ${item.opis}<br><br>
          🚀 ${item.dojazd}<br><br>
          <a href="${map}" target="_blank">📍 Mapy</a>
        </div>
      `;
    }
  });
}
</script>

</body>
</html>
