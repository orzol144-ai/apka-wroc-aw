<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1e1e2f,#3b3b6d);
  color:white;
  display:flex;
  justify-content:center;
  padding:20px;
}

.box {
  background:#2a2a3d;
  padding:20px;
  border-radius:20px;
  width:100%;
  max-width:400px;
}

.card {
  margin-top:20px;
  background:#1f1f2e;
  padding:15px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="box">

<h2>📍 Plan dnia</h2>

<select id="styl">
  <option value="leniwy">😴 Leniwy</option>
  <option value="aktywny">🏃 Aktywny</option>
  <option value="romantyczny">❤️ Romantyczny</option>
</select>

<button onclick="start()">🚀 Generuj plan</button>

<div id="app"></div>

</div>

<script>

async function start() {
  const styl = document.getElementById("styl").value;

  document.getElementById("app").innerHTML = "⏳ Tworzę plan...";

  try {
    const res = await fetch("/plan", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ styl })
    });

    const data = await res.json();

    let html = "<h3>🔥 Twój dzień</h3>";

    let hour = 10;

    data.list.forEach(item => {
      html += `
        <div class="card">
          <h4>${hour}:00 — ${item.miejsce}</h4>
          <p>${item.opis}</p>
          <p>🚶 ${item.czas}</p>
        </div>
      `;
      hour += 2;
    });

    document.getElementById("app").innerHTML = html;

  } catch {
    document.getElementById("app").innerHTML = "❌ Błąd";
  }
}

</script>

</body>
</html>
