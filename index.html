<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
}

.box {
  background: rgba(255,255,255,0.95);
  margin-top: 30px;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  margin-top: 10px;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color: white;
  font-weight: bold;
}

select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
}

#cards {
  margin-top: 20px;
}

.card {
  background: #1e1e1e;
  color: white;
  padding: 15px;
  border-radius: 15px;
  margin-top: 15px;
  text-align: left;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.card img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 10px;
}

.card a {
  color: #8ab4ff;
  text-decoration: none;
}
</style>

</head>
<body>

<div class="box">
  <h2>📍 Plan dnia</h2>

  <select id="styl">
    <option value="leniwy">😴 Leniwy</option>
    <option value="aktywny">🏃 Aktywny</option>
    <option value="romantyczny">❤️ Romantyczny</option>
  </select>

  <select id="transport">
    <option value="pieszo">🚶 Pieszo</option>
    <option value="komunikacja">🚋 Komunikacja</option>
    <option value="auto">🚗 Auto</option>
  </select>

  <button onclick="start()">🚀 Start</button>

  <div id="cards"></div>
</div>

<script>
let dane = {};
let aktualnaKategoria = "kawa";
let index = 0;

async function start() {
  const styl = document.getElementById("styl").value;
  const transport = document.getElementById("transport").value;

  document.getElementById("cards").innerHTML = "Ładowanie...";

  const res = await fetch("/plan", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ styl, transport })
  });

  dane = await res.json();

  aktualnaKategoria = "kawa";
  index = 0;

  pokaz();
}

function pokaz() {
  const kontener = document.getElementById("cards");
  kontener.innerHTML = "";

  const lista = dane[aktualnaKategoria];

  if (!lista || lista.length === 0) return;

  const item = lista[index];

  const img = `https://source.unsplash.com/600x400/?${encodeURIComponent(item.name + " Wrocław")}`;

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${img}">
    <h3>${item.name}</h3>
    <p>${item.opis}</p>
    <small>${item.dojazd}</small><br><br>

    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.name)}" target="_blank">
      📍 Otwórz w Mapach
    </a>
  `;

  kontener.appendChild(card);
}

// SWIPE
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (endX < startX - 50) {
    next();
  }

  if (endX > startX + 50) {
    prev();
  }
});

function next() {
  const lista = dane[aktualnaKategoria];
  if (!lista) return;

  index++;

  if (index >= lista.length) {
    index = 0;

    if (aktualnaKategoria === "kawa") aktualnaKategoria = "jedzenie";
    else if (aktualnaKategoria === "jedzenie") aktualnaKategoria = "spacer";
    else if (aktualnaKategoria === "spacer") aktualnaKategoria = "atrakcja";
    else aktualnaKategoria = "kawa";
  }

  pokaz();
}

function prev() {
  const lista = dane[aktualnaKategoria];
  if (!lista) return;

  index--;

  if (index < 0) index = 0;

  pokaz();
}
</script>

</body>
</html>
