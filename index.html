<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>

:root{
  --bg1:#0f172a;
  --bg2:#020617;
  --accent:#38bdf8;
  --accent2:#2563eb;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background: radial-gradient(circle at top,var(--bg1),var(--bg2));
  color:white;
}

/* 🔥 HEADER GLASS */
.header{
  position:sticky;
  top:0;
  backdrop-filter:blur(15px);
  background:rgba(15,23,42,0.7);
  padding:15px;
  z-index:10;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.title-main{
  font-size:20px;
  font-weight:600;
}

/* SELECT */
select{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.07);
  color:white;
}

/* BUTTON PREMIUM */
button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:600;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 8px 25px rgba(56,189,248,0.4);
  color:white;
}

/* CONTAINER */
.container{
  max-width:420px;
  margin:auto;
  padding:10px 15px 30px;
}

/* MAP HERO */
#map{
  height:220px;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 25px 50px rgba(0,0,0,0.6);
  margin-bottom:25px;
}

/* TIMELINE */
.timeline{
  position:relative;
  margin-left:10px;
}

.timeline::before{
  content:"";
  position:absolute;
  left:15px;
  top:0;
  bottom:0;
  width:2px;
  background:rgba(255,255,255,0.08);
}

/* ITEM */
.item{
  position:relative;
  margin-bottom:25px;
  padding-left:40px;
}

/* DOT */
.dot{
  position:absolute;
  left:6px;
  top:5px;
  width:18px;
  height:18px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 0 10px var(--accent);
}

/* CARD */
.card{
  padding:18px;
  border-radius:20px;
  background:linear-gradient(145deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));
  backdrop-filter:blur(20px);
  box-shadow:0 15px 40px rgba(0,0,0,0.5);
  animation:fadeUp 0.4s ease;
}

/* ANIMACJA */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(15px);}
  to{opacity:1; transform:translateY(0);}
}

/* TITLE */
.title{
  font-weight:600;
  font-size:16px;
}

/* META */
.meta{
  margin-top:10px;
  font-size:14px;
  opacity:0.85;
  line-height:1.5;
}

/* BADGE GODZINY */
.time{
  font-size:13px;
  opacity:0.7;
  margin-bottom:5px;
}

/* BUTTON MAP */
.map-btn{
  margin-top:12px;
  display:block;
  text-align:center;
  padding:10px;
  border-radius:10px;
  background:rgba(56,189,248,0.15);
  color:var(--accent);
  text-decoration:none;
  transition:0.2s;
}

.map-btn:active{
  transform:scale(0.97);
}

</style>
</head>

<body>

<div class="header">
  <div class="title-main">📍 Plan dnia</div>

  <select id="styl">
    <option value="leniwy">😴 Leniwy</option>
    <option value="aktywny">🏃 Aktywny</option>
    <option value="romantyczny">❤️ Romantyczny</option>
  </select>

  <button onclick="start()">🚀 Generuj plan</button>
</div>

<div class="container">
  <div id="map"></div>
  <div id="app"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map;
let markers=[];
let line;

function initMap(){
  if(!map){
    map=L.map('map').setView([51.11,17.03],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  }
}

function clearMap(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  if(line) map.removeLayer(line);
}

async function getRoute(coords){
  const coordsStr=coords.map(c=>c[1]+","+c[0]).join(";");
  const res=await fetch("https://router.project-osrm.org/route/v1/foot/"+coordsStr+"?overview=full&geometries=geojson");
  const data=await res.json();
  if(!data.routes||!data.routes[0]) return null;
  return data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
}

async function start(){

  document.getElementById("app").innerHTML="⏳ Tworzę plan...";

  const styl=document.getElementById("styl").value;

  const res=await fetch("/plan",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({styl})
  });

  const data=await res.json();

  initMap();
  clearMap();

  let html='<div class="timeline">';
  let hour=10;
  let coords=[];

  data.list.forEach((item,i)=>{

    const mapUrl="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(item.miejsce);

    html+=`
      <div class="item">
        <div class="dot"></div>
        <div class="card">
          <div class="time">${hour}:00</div>
          <div class="title">${item.miejsce}</div>
          <div class="meta">${item.opis}</div>
          <div class="meta">🚶 ${item.dojscie}</div>
          <div class="meta">⏱️ ${item.czas_pobytu}</div>
          <a class="map-btn" href="${mapUrl}" target="_blank">📍 Otwórz mapę</a>
        </div>
      </div>
    `;

    if(item.lat&&item.lon){
      coords.push([item.lat,item.lon]);
      markers.push(L.marker([item.lat,item.lon]).addTo(map));
    }

    hour+=2;
  });

  html+='</div>';

  if(coords.length>1){
    const route=await getRoute(coords);
    if(route){
      line=L.polyline(route,{color:"#38bdf8",weight:5}).addTo(map);
      map.fitBounds(line.getBounds());
    }
  }

  document.getElementById("app").innerHTML=html;

  setTimeout(()=>map.invalidateSize(),200);
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/service-worker.js");
}

</script>

</body>
</html>
