<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1e1e2f,#3a2f63);
  color:white;
  display:flex;
  justify-content:center;
}

.box {
  width:95%;
  max-width:420px;
  margin-top:20px;
  background:#1f1f2e;
  padding:20px;
  border-radius:20px;
}

button, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button {
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  font-weight:bold;
}

.quick {
  display:flex;
  gap:10px;
}

.quick button {
  width:50%;
}

.card {
  background:#2a2a3a;
  padding:15px;
  margin-top:15px;
  border-radius:15px;
}

.nav {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.nav button {
  width:48%;
}
</style>
</head>

<body>

<div class="box">

<h2>📍 Plan dnia</h2>

<select id="styl">
<option value="leniwy">😴 Leniwy</option>
<option value="aktywny">🏃 Aktywny</option>
<option value="romantyczny">❤️ Romantyczny</option>
</select>

<select id="transport">
<option value="pieszo">🚶 Pieszo</option>
<option value="auto">🚗 Auto</option>
</select>

<button onclick="start()">🚀 Start</button>

<div class="quick">
<button onclick="glodny()">🍔 Głodny</button>
<button onclick="zmeczony()">😴 Odpoczynek</button>
</div>

<div id="app"></div>

</div>

<script>

let rawText = "";

// 🚀 START
async function start(){
  const styl = document.getElementById("styl").value;
  const transport = document.getElementById("transport").value;

  document.getElementById("app").innerHTML = "⏳ Generuję plan...";

  const res = await fetch("/plan",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ styl, transport })
  });

  const data = await res.json();
  rawText = data.wynik;

  render();
}

// 🍔 GŁODNY
async function glodny(){
  const res = await fetch("/food",{method:"POST"});
  const data = await res.json();
  rawText = data.wynik;
  render();
}

// 😴 ODPOCZYNEK
async function zmeczony(){
  const res = await fetch("/short",{method:"POST"});
  const data = await res.json();
  rawText = data.wynik;
  render();
}

// 🔥 RENDER PLANU
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "<h3>🔥 Plan dnia</h3>";

  // DZIELENIE PO GODZINACH
  const parts = rawText.split(/(?=\d{2}:\d{2})/);

  parts.forEach(p => {
    const text = p.trim();
    if(!text) return;

    // NAZWA
    const nameMatch = text.match(/\d{2}:\d{2} – (.+)/);
    const name = nameMatch ? nameMatch[1] : "Miejsce";

    // GODZINA
    const timeMatch = text.match(/\d{2}:\d{2}/);
    const time = timeMatch ? timeMatch[0] : "";

    const map = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}`;

    app.innerHTML += `
      <div class="card">
        <b>${time} – ${name}</b><br><br>
        ${text.replace(/\d{2}:\d{2} – .+/, "")}<br><br>

        <a href="${map}" target="_blank">📍 Mapy</a>
      </div>
    `;
  });
}

</script>

</body>
</html>
