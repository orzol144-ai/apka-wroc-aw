<!DOCTYPE html>
<html>
<head>
  <title>Planer dnia – Wrocław</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      padding: 40px;
    }

    h1 {
      color: #00ffcc;
    }

    select, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }

    button {
      background: #00ffcc;
      border: none;
      cursor: pointer;
    }

    .secondary {
      background: #444;
      color: white;
    }

    pre {
      background: #222;
      padding: 20px;
      text-align: left;
      display: inline-block;
      margin-top: 20px;
      min-width: 320px;
    }
  </style>
</head>
<body>

<h1>Planer dnia – Wrocław (Anka 😎)</h1>

<p>Wybierz styl:</p>

<select id="styl">
  <option value="leniwy">😴 Leniwy</option>
  <option value="normalny">🚶 Normalny</option>
  <option value="ambitny">🧗 Ambitny</option>
</select>

<br>

<button onclick="generujPlan()">Ułóż mi dzień</button>
<button class="secondary" onclick="generujPlan()">🔄 Zmień plan</button>
<button class="secondary" onclick="trybZmeczenie()">😩 Jestem zmęczony</button>

<pre id="wynik">Kliknij i zobacz plan 👇</pre>

<script>
function losuj(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// PRAWDZIWE miejsca we Wrocławiu
const miejsca = {
  start: [
    "Rynek (serce miasta, kolorowe kamienice)",
    "Plac Solny (kwiaty i klimat)"
  ],
  spacer: [
    "Ostrów Tumski (najstarsza część miasta)",
    "Bulwar Dunikowskiego (widok na Odrę)"
  ],
  jedzenie: [
    "Pierogarnia (polskie klasyki)",
    "Pizza neapolitańska",
    "Street food (burger/kebab)",
    "Restauracja nad Odrą"
  ],
  atrakcja: [
    "Panorama Racławicka (unikalne malowidło 360°)",
    "Zoo Wrocław (jedno z najlepszych w Polsce)",
    "Hala Stulecia + fontanna"
  ],
  chill: [
    "Park Szczytnicki (duży park, cisza)",
    "Wyspa Słodowa (relaks i ludzie)"
  ]
};

function generujPlan() {
  const styl = document.getElementById("styl").value;

  let plan = "";

  if (styl === "leniwy") {
    plan = `
📍 WROCŁAW – TRYB LENIWY

10:00 – ${losuj(miejsca.start)}

12:00 – ${losuj(miejsca.spacer)}

14:00 – ${losuj(miejsca.jedzenie)}

16:00 – ${losuj(miejsca.chill)}

19:00 – Kolacja + chill
`;
  }

  if (styl === "normalny") {
    plan = `
📍 WROCŁAW – TRYB NORMALNY

09:00 – ${losuj(miejsca.start)}

11:00 – ${losuj(miejsca.spacer)}

13:30 – ${losuj(miejsca.jedzenie)}

15:30 – ${losuj(miejsca.atrakcja)}

18:30 – Kolacja
`;
  }

  if (styl === "ambitny") {
    plan = `
📍 WROCŁAW – TRYB AMBITNY

08:00 – ${losuj(miejsca.start)}

10:00 – ${losuj(miejsca.spacer)}

12:00 – ${losuj(miejsca.atrakcja)}

14:00 – ${losuj(miejsca.jedzenie)}

16:00 – ${losuj(miejsca.atrakcja)}

19:00 – Kolacja
`;
  }

  document.getElementById("wynik").innerText = plan;
}

function trybZmeczenie() {
  let plan = `
⚡ ZMIANA PLANU – TRYB ZMĘCZONY

👉 skracamy plan
👉 mniej chodzenia

13:00 – ${losuj(miejsca.jedzenie)}

14:30 – ${losuj(miejsca.chill)}

17:00 – Lekki spacer

19:00 – Kolacja i koniec 😄
`;

  document.getElementById("wynik").innerText = plan;
}
</script>

</body>
</html>
