<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1e1e2f,#3b3b6d);
  color:white;
  display:flex;
  justify-content:center;
  padding:20px;
}

.box {
  background:#2a2a3d;
  padding:20px;
  border-radius:20px;
  width:100%;
  max-width:400px;
  text-align:center;
}

button, select {
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:none;
}

.card {
  margin-top:20px;
  background:#1f1f2e;
  padding:15px;
  border-radius:15px;
}

.actions {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.actions button {
  flex:1;
}
</style>
</head>

<body>

<div class="box">

<h2>📍 Plan dnia</h2>

<select id="styl">
  <option value="leniwy">😴 Leniwy</option>
  <option value="aktywny">🏃 Aktywny</option>
  <option value="romantyczny">❤️ Romantyczny</option>
</select>

<button onclick="start()">🚀 Start</button>

<div id="app"></div>

<div id="map" style="height:300px; margin-top:20px; border-radius:15px;"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let list = [];
let index = 0;
let finalPlan = [];
let weatherData = null;

let map;
let markers = [];

function initMap() {
  map = L.map('map').setView([51.11, 17.03], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
}

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

function addMarker(item) {
  if (!item.lat || !item.lon) return;

  const marker = L.marker([item.lat, item.lon]).addTo(map)
    .bindPopup(item.miejsce);

  markers.push(marker);
}

async function start() {
  try {
    document.getElementById("app").innerHTML = "⏳ Generuję...";

    const styl = document.getElementById("styl").value;

    const res = await fetch("/plan", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ styl })
    });

    const data = await res.json();

    if (!data.list || !data.list.length) {
      document.getElementById("app").innerHTML = "❌ Brak planu";
      return;
    }

    list = data.list;
    index = 0;
    finalPlan = [];
    weatherData = data.weather || {};

    initMap();
    clearMarkers();

    render();

  } catch {
    document.getElementById("app").innerHTML = "❌ Błąd";
  }
}

function render() {
  const app = document.getElementById("app");

  if (index >= list.length) return showFinal();

  const item = list[index];

  const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.miejsce)}`;

  app.innerHTML = `
    <div>🌦️ ${weatherData?.temp ?? "?"}°C</div>

    <div class="card">
      <h3>${item.miejsce}</h3>
      <p>${item.opis}</p>

      <p>⭐ ${item.rating || "4.5"} (${item.opinie || "???"} opinii)</p>

      <a href="${mapUrl}" target="_blank">📍 Google Maps</a>

      <div class="actions">
        <button onclick="reject()">👎</button>
        <button onclick="accept()">👍</button>
      </div>
    </div>
  `;
}

// 🔥 LIMIT ACCEPT
function accept() {
  if (finalPlan.length >= 7) return;

  addMarker(list[index]);
  finalPlan.push(list[index]);
  index++;
  render();
}

function reject() {
  index++;
  render();
}

// 🔥 FINAL (bez duplikatów + dobre godziny)
function showFinal() {
  try {
    let html = "<h3>🔥 Twój plan dnia</h3>";

    // usuń duplikaty
    const uniquePlan = [];
    finalPlan.forEach(item => {
      if (!uniquePlan.find(x => x.miejsce === item.miejsce)) {
        uniquePlan.push(item);
      }
    });

    // limit
    const safePlan = uniquePlan.slice(0, 7);

    let hour = 10;

    safePlan.forEach(item => {
      const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.miejsce || "")}`;

      html += `
        <div class="card">
          <h4>${hour}:00 — ${item.miejsce || "Brak"}</h4>
          <p>${item.opis || ""}</p>
          <p>⭐ ${item.rating || "4.5"} (${item.opinie || "???"} opinii)</p>
          <a href="${mapUrl}" target="_blank">📍 Google Maps</a>
        </div>
      `;

      hour += 2;

      if (hour > 22) return;
    });

    if (!safePlan.length) {
      html += "<p>❌ Nic nie wybrałeś</p>";
    }

    document.getElementById("app").innerHTML = html;

  } catch (e) {
    console.error(e);
    document.getElementById("app").innerHTML = "❌ Błąd renderowania";
  }
}

</script>

</body>
</html>
