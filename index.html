<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1e1e2f,#3b3b6d);
  color:white;
  display:flex;
  justify-content:center;
  padding:20px;
}

.box {
  background:#2a2a3d;
  padding:20px;
  border-radius:20px;
  width:100%;
  max-width:400px;
  text-align:center;
}

select, button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

button {
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  cursor:pointer;
}

.card {
  margin-top:20px;
  background:#1f1f2e;
  padding:15px;
  border-radius:15px;
  text-align:left;
}

.nav {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.nav button {
  flex:1;
}

</style>
</head>

<body>

<div class="box">

<h2>📍 Plan dnia</h2>

<select id="styl">
  <option value="leniwy">😴 Leniwy</option>
  <option value="aktywny">🏃 Aktywny</option>
  <option value="romantyczny">❤️ Romantyczny</option>
</select>

<select id="transport">
  <option value="pieszo">🚶 Pieszo</option>
  <option value="auto">🚗 Auto</option>
</select>

<button onclick="start()">🚀 Start</button>

<div id="app"></div>

</div>

<script>

let plan = [];
let currentIndex = 0;

async function start() {
  const styl = document.getElementById("styl").value;
  const transport = document.getElementById("transport").value;

  document.getElementById("app").innerHTML = "⏳ Generuję plan...";

  try {
    const res = await fetch("/plan", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ styl, transport })
    });

    const data = await res.json();

    console.log(data);

    if (!data.plan) {
      document.getElementById("app").innerHTML = "❌ Brak danych";
      return;
    }

    plan = data.plan;
    currentIndex = 0;

    render();

  } catch (e) {
    console.error(e);
    document.getElementById("app").innerHTML = "❌ Błąd serwera";
  }
}

function render() {
  const app = document.getElementById("app");

  if (!plan.length) {
    app.innerHTML = "Brak planu";
    return;
  }

  const item = plan[currentIndex];

  app.innerHTML = `
    <div class="card">
      <h3>${item.godzina} — ${item.miejsce}</h3>
      <p>${item.opis}</p>
      <p>🚶 ${item.dojscie}</p>

      <div class="nav">
        <button onclick="prev()">⬅️</button>
        <button onclick="next()">➡️</button>
        <button onclick="remove()">❌</button>
      </div>
    </div>
  `;
}

function next() {
  if (currentIndex < plan.length - 1) {
    currentIndex++;
    render();
  }
}

function prev() {
  if (currentIndex > 0) {
    currentIndex--;
    render();
  }
}

function remove() {
  plan.splice(currentIndex, 1);

  if (currentIndex >= plan.length) {
    currentIndex = plan.length - 1;
  }

  render();
}

</script>

</body>
</html>
