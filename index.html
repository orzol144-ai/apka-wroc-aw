<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1e1e2f,#3b3b6d);
  color:white;
  display:flex;
  justify-content:center;
  padding:20px;
}

.box {
  background:#2a2a3d;
  padding:20px;
  border-radius:20px;
  width:100%;
  max-width:400px;
  text-align:center;
}

button, select {
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:none;
}

.card {
  margin-top:20px;
  background:#1f1f2e;
  padding:15px;
  border-radius:15px;
}

.actions {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.actions button {
  flex:1;
}
</style>
</head>

<body>

<div class="box">

<h2>📍 Plan dnia</h2>

<select id="styl">
  <option value="leniwy">😴 Leniwy</option>
  <option value="aktywny">🏃 Aktywny</option>
  <option value="romantyczny">❤️ Romantyczny</option>
</select>

<button onclick="start()">🚀 Start</button>

<div id="app"></div>

<div id="map" style="height:300px; margin-top:20px; border-radius:15px;"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let list = [];
let index = 0;
let finalPlan = [];
let weatherData = null;

let map;
let markers = [];

// MAPA
function initMap() {
  map = L.map('map').setView([51.11, 17.03], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
}

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

async function addMarker(place) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(place + " Wrocław")}`);
    const data = await res.json();

    if (!data[0]) return;

    const marker = L.marker([data[0].lat, data[0].lon]).addTo(map)
      .bindPopup(place);

    markers.push(marker);

  } catch {}
}

// START
async function start() {
  try {
    document.getElementById("app").innerHTML = "⏳ Generuję...";

    const styl = document.getElementById("styl").value;

    const res = await fetch("/plan", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ styl })
    });

    const data = await res.json();

    if (!data.list || !data.list.length) {
      document.getElementById("app").innerHTML = "❌ Brak planu";
      return;
    }

    list = data.list;
    index = 0;
    finalPlan = [];
    weatherData = data.weather || {};

    initMap();
    clearMarkers();

    render();

  } catch {
    document.getElementById("app").innerHTML = "❌ Błąd";
  }
}

// RENDER
function render() {
  const app = document.getElementById("app");

  if (index >= list.length) return showFinal();

  const item = list[index];

  const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.miejsce)}`;

  app.innerHTML = `
    <div>🌦️ ${weatherData?.temp ?? "?"}°C</div>

    <div class="card">
      <h3>${item.miejsce}</h3>
      <p>${item.opis}</p>

      <a href="${mapUrl}" target="_blank">📍 Google Maps</a>

      <div class="actions">
        <button onclick="reject()">👎</button>
        <button onclick="accept()">👍</button>
      </div>
    </div>
  `;
}

// AKCJE
function accept() {
  addMarker(list[index].miejsce);
  finalPlan.push(list[index]);
  index++;
  render();
}

function reject() {
  index++;
  render();
}

// FINAL
function showFinal() {
  let html = "<h3>🔥 Twój plan dnia</h3>";

  let hour = 10;

  finalPlan.forEach(item => {
    const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.miejsce)}`;

    html += `
      <div class="card">
        <h4>${hour}:00 — ${item.miejsce}</h4>
        <p>${item.opis}</p>
        <a href="${mapUrl}" target="_blank">📍 Google Maps</a>
      </div>
    `;

    hour += 2;
  });

  document.getElementById("app").innerHTML = html;
}

</script>

</body>
</html>
