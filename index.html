<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:420px;
  padding:15px;
}

.header {
  position:sticky;
  top:0;
  background:rgba(15,23,42,0.8);
  backdrop-filter:blur(10px);
  padding:10px;
  border-radius:15px;
  z-index:10;
}

select, button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

button {
  background:#38bdf8;
  color:black;
  font-weight:bold;
}

.card {
  margin-top:15px;
  padding:15px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.title {
  font-size:18px;
  font-weight:bold;
}

.meta {
  margin-top:8px;
  font-size:14px;
  opacity:0.8;
}

#map {
  height:250px;
  margin-top:15px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>📍 Plan dnia</h2>

  <select id="styl">
    <option value="leniwy">😴 Leniwy</option>
    <option value="aktywny">🏃 Aktywny</option>
    <option value="romantyczny">❤️ Romantyczny</option>
  </select>

  <button onclick="start()">🚀 Generuj plan</button>
</div>

<div id="map"></div>
<div id="app"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map;
let markers = [];
let line;

function initMap() {
  if (!map) {
    map = L.map('map').setView([51.11, 17.03], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
      .addTo(map);
  }
}

function clearMap() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (line) map.removeLayer(line);
}

// 🔥 OSRM
async function getRoute(coords) {
  const url = \`https://router.project-osrm.org/route/v1/foot/\${coords.map(c => c[1]+","+c[0]).join(";")}?overview=full&geometries=geojson\`;
  const res = await fetch(url);
  const data = await res.json();
  return data.routes?.[0]?.geometry?.coordinates.map(c => [c[1], c[0]]);
}

async function start() {
  document.getElementById("app").innerHTML = "⏳ Tworzę plan...";

  const styl = document.getElementById("styl").value;

  const res = await fetch("/plan", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ styl })
  });

  const data = await res.json();

  initMap();
  clearMap();

  let html = "";

  let hour = 10;
  let coords = [];

  data.list.forEach((item, i) => {

    html += \`
      <div class="card">
        <div class="title">\${i+1}. \${hour}:00 — \${item.miejsce}</div>
        <div class="meta">\${item.opis}</div>

        <div class="meta">🚶 \${item.dojscie}</div>
        <div class="meta">⏱️ \${item.czas_pobytu}</div>
      </div>
    \`;

    if (item.lat && item.lon) {
      coords.push([item.lat, item.lon]);

      const marker = L.marker([item.lat, item.lon])
        .addTo(map)
        .bindPopup(\`\${i+1}. \${item.miejsce}\`);

      markers.push(marker);
    }

    hour += 2;
  });

  if (coords.length > 1) {
    const route = await getRoute(coords);

    if (route) {
      line = L.polyline(route, { color:"#38bdf8", weight:5 }).addTo(map);
      map.fitBounds(line.getBounds());
    }
  }

  document.getElementById("app").innerHTML = html;
}

</script>

</body>
</html>
