<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#667eea">
<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
}

.box {
  background: white;
  margin-top: 20px;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 420px;
}

button, select {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
}

button {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-weight: bold;
}

.quick {
  display: flex;
  gap: 10px;
}

#wynik {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.item {
  background: #f5f5f5;
  padding: 14px;
  border-radius: 12px;
}

.back {
  background: #333;
}
</style>
</head>

<body>

<div class="box">
  <h2>📍 Plan dnia – Wrocław</h2>

  <select id="styl">
    <option value="leniwy">😴 Leniwy</option>
    <option value="aktywny">🏃 Aktywny</option>
    <option value="romantyczny">❤️ Romantyczny</option>
  </select>

  <button onclick="ulozDzien()">🚀 Ułóż mi dzień</button>

  <div class="quick">
    <button onclick="glodny()">🍔 Jestem głodny</button>
    <button onclick="zmeczony()">😴 Jestem zmęczony</button>
  </div>

  <button class="back" onclick="pokazPlan()">⬅️ Wróć do planu</button>

  <div id="wynik"></div>
</div>

<script>
let ostatniPlan = localStorage.getItem("plan") || "";

// render
function render(text){
  const wynik = document.getElementById("wynik");

  const linie = text.split("\n");
  let html = "";

  linie.forEach(linia => {
    linia = linia.trim();
    if (!linia) return;

    const mapLink = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(linia);

    html += `<div class="item">
      📍 ${linia}<br>
      <a href="${mapLink}" target="_blank">➡️ Mapy</a>
    </div>`;
  });

  wynik.innerHTML = html;
}

// GPS
function getLocation(){
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      pos => resolve({
        lat: pos.coords.latitude,
        lon: pos.coords.longitude
      }),
      err => reject(err)
    );
  });
}

// PLAN
async function ulozDzien(){
  const styl = document.getElementById("styl").value;
  const wynik = document.getElementById("wynik");

  wynik.innerHTML = "⏳ Generuję...";

  const res = await fetch("https://apka-wroc-aw-1.onrender.com/plan", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ styl })
  });

  const data = await res.json();

  ostatniPlan = data.wynik;
  localStorage.setItem("plan", data.wynik);

  render(data.wynik);
}

// FOOD + GPS
async function glodny(){
  const wynik = document.getElementById("wynik");

  wynik.innerHTML = "📍 Pobieram lokalizację...";

  try {
    const loc = await getLocation();

    wynik.innerHTML = "🍔 Szukam jedzenia...";

    const res = await fetch("https://apka-wroc-aw-1.onrender.com/food", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(loc)
    });

    const data = await res.json();
    render(data.wynik);

  } catch {
    wynik.innerHTML = "❌ Brak dostępu do lokalizacji";
  }
}

// SHORT
async function zmeczony(){
  const wynik = document.getElementById("wynik");

  wynik.innerHTML = "😴 Skracam plan...";

  const res = await fetch("https://apka-wroc-aw-1.onrender.com/short", {
    method:"POST"
  });

  const data = await res.json();
  render(data.wynik);
}

// POWRÓT
function pokazPlan(){
  if(ostatniPlan){
    render(ostatniPlan);
  } else {
    alert("Najpierw wygeneruj plan 😄");
  }
}

// AUTO LOAD (jak wrócisz do appki)
if(ostatniPlan){
  render(ostatniPlan);
}
</script>

</body>
</html>
