<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

.header {
  background:rgba(15,23,42,0.95);
  padding:10px;
}

.container {
  max-width:420px;
  margin:auto;
  padding:10px 15px 20px 15px;
}

select, button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

button {
  background:#38bdf8;
  color:black;
  font-weight:bold;
}

.card {
  margin-top:15px;
  padding:15px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
}

.title {
  font-size:18px;
  font-weight:bold;
}

.meta {
  margin-top:8px;
  font-size:14px;
  opacity:0.8;
}

#map {
  height:250px;
  margin-top:15px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="header">
  <div class="container">
    <h2>📍 Plan dnia</h2>

    <select id="styl">
      <option value="leniwy">😴 Leniwy</option>
      <option value="aktywny">🏃 Aktywny</option>
      <option value="romantyczny">❤️ Romantyczny</option>
    </select>

    <button onclick="start()">🚀 Generuj plan</button>
  </div>
</div>

<div class="container">
  <div id="map"></div>
  <div id="app"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map;
let markers = [];
let line;

function initMap() {
  if (!map) {
    map = L.map('map').setView([51.11, 17.03], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
      .addTo(map);
  }
}

function clearMap() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (line) map.removeLayer(line);
}

async function getRoute(coords) {
  const coordsStr = coords.map(function(c) {
    return c[1] + "," + c[0];
  }).join(";");

  const url = "https://router.project-osrm.org/route/v1/foot/" +
              coordsStr +
              "?overview=full&geometries=geojson";

  const res = await fetch(url);
  const data = await res.json();

  if (!data.routes || !data.routes[0]) return null;

  return data.routes[0].geometry.coordinates.map(function(c) {
    return [c[1], c[0]];
  });
}

async function start() {
  document.getElementById("app").innerHTML = "⏳ Tworzę plan...";

  try {
    const styl = document.getElementById("styl").value;

    const res = await fetch("/plan", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ styl })
    });

    const data = await res.json();

    if (!data || !data.list) {
      document.getElementById("app").innerHTML = "❌ Błąd danych";
      return;
    }

    initMap();
    clearMap();

    let html = "";
    let hour = 10;
    let coords = [];

    data.list.forEach(function(item, i) {

      html +=
        '<div class="card">' +
          '<div class="title">' + (i+1) + '. ' + hour + ':00 — ' + item.miejsce + '</div>' +
          '<div class="meta">' + (item.opis || "") + '</div>' +
          '<div class="meta">🚶 ' + (item.dojscie || "") + '</div>' +
          '<div class="meta">⏱️ ' + (item.czas_pobytu || "") + '</div>' +
        '</div>';

      if (item.lat && item.lon) {
        coords.push([item.lat, item.lon]);

        const marker = L.marker([item.lat, item.lon])
          .addTo(map)
          .bindPopup((i+1) + ". " + item.miejsce);

        markers.push(marker);
      }

      hour += 2;
    });

    if (coords.length > 1) {
      const route = await getRoute(coords);

      if (route) {
        line = L.polyline(route, { color:"#38bdf8", weight:5 }).addTo(map);
        map.fitBounds(line.getBounds());
      }
    }

    document.getElementById("app").innerHTML = html;

    setTimeout(function() {
      map.invalidateSize();
    }, 200);

  } catch (e) {
    console.error(e);
    document.getElementById("app").innerHTML = "❌ Błąd aplikacji";
  }
}

// 🔥 PWA
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}

</script>

</body>
</html>
