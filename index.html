<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Planer dnia</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
}

.box {
  width:95%;
  max-width:400px;
  background:white;
  margin-top:20px;
  border-radius:20px;
  padding:20px;
}

.card {
  background:#f5f5f5;
  padding:20px;
  border-radius:15px;
  margin-top:15px;
  transition: transform 0.3s, opacity 0.3s;
  touch-action: pan-y;
}

.swipe-left {
  transform: translateX(-100px);
  opacity:0;
}

.swipe-right {
  transform: translateX(100px);
  opacity:0;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#667eea;
  color:white;
  font-weight:bold;
}

.actions {
  display:flex;
  gap:10px;
}

.actions button {
  flex:1;
}

.map-btn {
  background:#333;
}

.save-btn {
  background:#28a745;
}
</style>
</head>

<body>

<div class="box">
<h2>📍 Plan dnia</h2>

<select id="styl">
  <option>leniwy</option>
  <option>aktywny</option>
</select>

<select id="transport">
  <option value="pieszo">🚶 pieszo</option>
  <option value="komunikacja">🚋 komunikacja</option>
  <option value="auto">🚗 auto</option>
</select>

<button onclick="start()">🚀 Start</button>
<button onclick="pokazZapisane()">📂 Zapisane plany</button>

<div id="app"></div>
</div>

<script>
let data = {};
let sloty = ["kawa","jedzenie","spacer","atrakcja"];
let currentSlot = 0;
let index = 0;
let wybrane = [];

let startX = 0;

// START
async function start() {
  const styl = document.getElementById("styl").value;
  const transport = document.getElementById("transport").value;

  const res = await fetch("/plan", {
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({ styl, transport })
  });

  data = await res.json();

  currentSlot = 0;
  index = 0;
  wybrane = [];

  pokaz();
}

// POKAZ KARTĘ
function pokaz() {
  const app = document.getElementById("app");

  if(currentSlot >= sloty.length){
    pokazPodsumowanie();
    return;
  }

  const slot = sloty[currentSlot];
  const item = data[slot][index];

  app.innerHTML = `
    <h3>${slot.toUpperCase()}</h3>

    <div class="card" id="card">
      <b>${item.name}</b><br><br>
      ${item.opis}<br><br>
      🚀 ${item.dojazd}
    </div>

    <button class="map-btn" onclick="mapa('${item.mapy}')">📍 Mapy</button>

    <div class="actions">
      <button onclick="next()">❌</button>
      <button onclick="choose()">👍</button>
    </div>
  `;

  dodajSwipe();
}

// SWIPE
function dodajSwipe(){
  const card = document.getElementById("card");

  card.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
  });

  card.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX;
    let diff = endX - startX;

    if(diff > 50){
      card.classList.add("swipe-right");
      setTimeout(choose,200);
    } else if(diff < -50){
      card.classList.add("swipe-left");
      setTimeout(next,200);
    }
  });
}

// NEXT
function next(){
  index++;
  pokaz();
}

// CHOOSE
function choose(){
  const slot = sloty[currentSlot];
  wybrane.push(data[slot][index]);
  currentSlot++;
  index = 0;
  pokaz();
}

// MAPA
function mapa(link){
  window.open(link,"_blank");
}

// PODSUMOWANIE + ZAPIS
function pokazPodsumowanie(){
  const app = document.getElementById("app");

  app.innerHTML = "<h3>Twój plan:</h3>";

  wybrane.forEach(x=>{
    app.innerHTML += `
      <div class="card">
        <b>${x.name}</b><br>
        ${x.opis}
      </div>
    `;
  });

  app.innerHTML += `<button class="save-btn" onclick="zapisz()">💾 Zapisz plan</button>`;
}

// ZAPIS
function zapisz(){
  let zapisane = JSON.parse(localStorage.getItem("plany") || "[]");
  zapisane.push(wybrane);
  localStorage.setItem("plany", JSON.stringify(zapisane));
  alert("Zapisano!");
}

// POKAŻ ZAPISANE
function pokazZapisane(){
  const app = document.getElementById("app");
  const zapisane = JSON.parse(localStorage.getItem("plany") || "[]");

  app.innerHTML = "<h3>Zapisane plany:</h3>";

  zapisane.forEach((plan,i)=>{
    app.innerHTML += `<div class="card"><b>Plan ${i+1}</b><br>`;
    plan.forEach(p=>{
      app.innerHTML += `${p.name}<br>`;
    });
    app.innerHTML += "</div>";
  });
}
</script>

</body>
</html>
