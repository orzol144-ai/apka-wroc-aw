<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Planer dnia</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
}

.box {
  background: rgba(255,255,255,0.95);
  margin-top: 40px;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
}

select, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

button {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:active {
  transform: scale(0.97);
}

#wynik {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* kafelki */
.item {
  background: #f7f7f7;
  padding: 14px;
  border-radius: 12px;
  opacity: 0;
  animation: fadeIn 0.4s ease forwards;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* animacja */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* loading */
.loading {
  text-align: center;
  font-weight: bold;
  color: #333;
}
</style>
</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<body>

<div class="box">
  <h2>📍 Plan dnia – Wrocław</h2>

  <select id="styl">
    <option value="leniwy">😴 Leniwy</option>
    <option value="aktywny">🏃 Aktywny</option>
    <option value="romantyczny">❤️ Romantyczny</option>
  </select>

  <button onclick="ulozDzien()">🚀 Ułóż mi dzień</button>

  <div id="wynik"></div>
</div>

<script>
async function ulozDzien() {
  const styl = document.getElementById("styl").value;
  const wynik = document.getElementById("wynik");

  wynik.innerHTML = '<div class="loading">⏳ Generuję plan...</div>';

  try {
    const res = await fetch("https://apka-wroc-aw-1.onrender.com/plan", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ styl: styl })
    });

    const data = await res.json();

    console.log("ODPOWIEDŹ:", data);

    const linie = data.wynik.split('\n');
    let html = '';

    linie.forEach((linia, i) => {
      linia = linia.trim();
      if (linia === '') return;

      html += `<div class="item" style="animation-delay:${i * 0.15}s">
        ${linia}
      </div>`;
    });

    wynik.innerHTML = html;

  } catch (err) {
    console.log("BŁĄD:", err);
    wynik.innerHTML = "❌ Błąd połączenia";
  }
}
</script>

</body>
</html>
