<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1e1e2f,#3b3b6d);
  color:white;
  display:flex;
  justify-content:center;
  padding:20px;
}

.box {
  background:#2a2a3d;
  padding:20px;
  border-radius:20px;
  width:100%;
  max-width:400px;
  text-align:center;
}

button, select {
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:none;
}

.card {
  margin-top:20px;
  background:#1f1f2e;
  padding:15px;
  border-radius:15px;
}

.actions {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.actions button {
  flex:1;
  font-size:18px;
}
</style>
</head>

<body>

<div class="box">

<h2>📍 Plan dnia</h2>

<select id="styl">
  <option value="leniwy">😴 Leniwy</option>
  <option value="aktywny">🏃 Aktywny</option>
  <option value="romantyczny">❤️ Romantyczny</option>
</select>

<button onclick="start()">🚀 Start</button>

<div id="app"></div>

</div>

<!-- 🔥 TO MUSI BYĆ NA DOLE I W CAŁOŚCI -->
<script>

let list = [];
let index = 0;
let finalPlan = [];
let weatherData = null;

async function start() {
  try {
    const styl = document.getElementById("styl").value;

    document.getElementById("app").innerHTML = "⏳ Generuję...";

    const res = await fetch("/plan", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ styl })
    });

    const data = await res.json();

    if (!data.list || !data.list.length) {
      document.getElementById("app").innerHTML = "❌ Brak planu";
      return;
    }

    list = data.list;
    index = 0;
    finalPlan = [];
    weatherData = data.weather || {};

    render();

  } catch (err) {
    console.error(err);
    document.getElementById("app").innerHTML = "❌ Błąd aplikacji";
  }
}

function render() {
  const app = document.getElementById("app");

  if (index >= list.length) {
    return showFinal();
  }

  const item = list[index];

  const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.miejsce || "")}`;

  app.innerHTML = `
    <div style="margin-bottom:10px;font-size:14px;">
      🌦️ ${weatherData?.temp ?? "?"}°C
    </div>

    <div class="card">
      <h3>${item.miejsce || "Brak nazwy"}</h3>
      <p>${item.opis || ""}</p>

      <a href="${mapUrl}" target="_blank">
        📍 Otwórz mapę
      </a>

      <div class="actions">
        <button onclick="reject()">👎</button>
        <button onclick="accept()">👍</button>
      </div>
    </div>
  `;
}

function accept() {
  finalPlan.push(list[index]);
  index++;
  render();
}

function reject() {
  index++;
  render();
}

function showFinal() {
  let html = "<h3>🔥 Twój plan dnia</h3>";

  let hour = 10;

  finalPlan.forEach(item => {
    const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.miejsce || "")}`;

    html += `
      <div class="card">
        <h4>${hour}:00 — ${item.miejsce}</h4>
        <p>${item.opis}</p>
        <a href="${mapUrl}" target="_blank">
          📍 Otwórz mapę
        </a>
      </div>
    `;

    hour += 2;
  });

  if (!finalPlan.length) {
    html += "<p>❌ Nic nie wybrałeś</p>";
  }

  document.getElementById("app").innerHTML = html;
}

</script>

</body>
</html>
