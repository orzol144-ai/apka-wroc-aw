<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1e1e2f,#3b3b6d);
  color:white;
  display:flex;
  justify-content:center;
  padding:20px;
}

.box {
  background:#2a2a3d;
  padding:20px;
  border-radius:20px;
  width:100%;
  max-width:400px;
  text-align:center;
}

button, select {
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:none;
}

.card {
  margin-top:20px;
  background:#1f1f2e;
  padding:15px;
  border-radius:15px;
}

.actions {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.actions button {
  flex:1;
  font-size:18px;
}
</style>
</head>

<body>

<div class="box">

<h2>📍 Plan dnia</h2>

<select id="styl">
  <option value="leniwy">😴 Leniwy</option>
  <option value="aktywny">🏃 Aktywny</option>
  <option value="romantyczny">❤️ Romantyczny</option>
</select>

<button onclick="start()">🚀 Start</button>

<div id="app"></div>

</div>

<script>

let list = [];
let index = 0;
let finalPlan = [];

async function start() {
  const styl = document.getElementById("styl").value;

  document.getElementById("app").innerHTML = "⏳ Generuję...";

  const res = await fetch("/plan", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ styl })
  });

  const data = await res.json();

  list = data.list || [];
  index = 0;
  finalPlan = [];

  render();
}

function render() {
  const app = document.getElementById("app");

  if (index >= list.length) {
    return showFinal();
  }

  const item = list[index];

  app.innerHTML = `
    <div class="card">
      <h3>${item.miejsce}</h3>
      <p>${item.opis}</p>

      <div class="actions">
        <button onclick="reject()">👎</button>
        <button onclick="accept()">👍</button>
      </div>
    </div>
  `;
}

function accept() {
  finalPlan.push(list[index]);
  index++;
  render();
}

function reject() {
  index++;
  render();
}

function showFinal() {
  let html = "<h3>🔥 Twój plan dnia</h3>";

  let hour = 10;

  finalPlan.forEach(item => {
    html += `
      <div class="card">
        <h4>${hour}:00 — ${item.miejsce}</h4>
        <p>${item.opis}</p>
      </div>
    `;
    hour += 2;
  });

  document.getElementById("app").innerHTML = html;
}

</script>

</body>
</html>
