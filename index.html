<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1e1e2f,#3a2f63);
  min-height:100vh;
  display:flex;
  justify-content:center;
  color:white;
}

.box {
  width:95%;
  max-width:420px;
  background:#1f1f2e;
  margin-top:20px;
  border-radius:20px;
  padding:20px;
}

select, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button {
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  font-weight:bold;
}

.quick {
  display:flex;
  gap:10px;
}

.quick button {
  flex:1;
}

.card {
  background:#2a2a3a;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
  transition:0.3s;
}

.card img {
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}

.actions {
  display:flex;
  gap:10px;
}

.actions button {
  flex:1;
}

.map-btn {
  background:#444;
}

.save-btn {
  background:#28a745;
}
</style>
</head>

<body>

<div class="box">

<h2>📍 Plan dnia</h2>

<select id="styl">
  <option value="leniwy">😴 Leniwy</option>
  <option value="aktywny">🏃 Aktywny</option>
  <option value="romantyczny">❤️ Romantyczny</option>
</select>

<select id="transport">
  <option value="pieszo">🚶 Pieszo</option>
  <option value="komunikacja">🚋 Komunikacja</option>
  <option value="auto">🚗 Auto</option>
</select>

<button onclick="start()">🚀 Generuj plan</button>

<div class="quick">
  <button onclick="glodny()">🍔 Głodny</button>
  <button onclick="zmeczony()">😴 Odpoczynek</button>
</div>

<button onclick="pokazZapisane()">📂 Zapisane</button>

<div id="app"></div>

</div>

<script>
let data = {};
let sloty = ["kawa","jedzenie","spacer","atrakcja"];
let currentSlot = 0;
let index = 0;
let wybrane = [];

let startX = 0;

// 🔥 START
async function start(){
  const styl = document.getElementById("styl").value;
  const transport = document.getElementById("transport").value;

  const res = await fetch("/plan",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ styl, transport })
  });

  data = await res.json();

  currentSlot = 0;
  index = 0;
  wybrane = [];

  pokaz();
}

// 🍔 GŁODNY
function glodny(){
  currentSlot = 1;
  index = 0;
  pokaz();
}

// 😴 ODPOCZYNEK
function zmeczony(){
  currentSlot = 2;
  index = 0;
  pokaz();
}

// 🔥 POKAZ KARTĘ
function pokaz(){
  const app = document.getElementById("app");

  if(currentSlot >= sloty.length){
    podsumowanie();
    return;
  }

  const slot = sloty[currentSlot];
  const item = data[slot][index];

  // 🔥 STABILNE ZDJĘCIA
  const img = `https://picsum.photos/400/250?random=${item.name.length + index}`;

  app.innerHTML = `
    <h3>${slot.toUpperCase()}</h3>

    <div class="card" id="card">
      <img src="${img}">
      <b>${item.name}</b><br><br>
      ${item.opis}<br><br>
      🚀 ${item.dojazd}
    </div>

    <button class="map-btn" onclick="mapa('${item.name}')">📍 Mapy</button>

    <div class="actions">
      <button onclick="next()">❌</button>
      <button onclick="choose()">👍</button>
    </div>
  `;

  swipe();
}

// 🔥 SWIPE
function swipe(){
  const card = document.getElementById("card");

  card.addEventListener("touchstart",e=>{
    startX = e.touches[0].clientX;
  });

  card.addEventListener("touchend",e=>{
    let diff = e.changedTouches[0].clientX - startX;

    if(diff > 60){
      choose();
    } else if(diff < -60){
      next();
    }
  });
}

// ❌ NEXT
function next(){
  index++;
  if(index >= data[sloty[currentSlot]].length){
    index = 0;
  }
  pokaz();
}

// 👍 CHOOSE
function choose(){
  const slot = sloty[currentSlot];
  wybrane.push(data[slot][index]);
  currentSlot++;
  index = 0;
  pokaz();
}

// 📍 MAPA
function mapa(name){
  window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}`);
}

// 📦 PODSUMOWANIE
function podsumowanie(){
  const app = document.getElementById("app");

  app.innerHTML = "<h3>🔥 Twój plan:</h3>";

  wybrane.forEach(x=>{
    app.innerHTML += `
      <div class="card">
        <b>${x.name}</b><br><br>
        ${x.opis}
      </div>
    `;
  });

  app.innerHTML += `<button class="save-btn" onclick="zapisz()">💾 Zapisz</button>`;
}

// 💾 ZAPIS
function zapisz(){
  let p = JSON.parse(localStorage.getItem("plany")||"[]");
  p.push(wybrane);
  localStorage.setItem("plany",JSON.stringify(p));
  alert("Zapisano 👍");
}

// 📂 ZAPISANE
function pokazZapisane(){
  const app = document.getElementById("app");
  const p = JSON.parse(localStorage.getItem("plany")||"[]");

  app.innerHTML = "<h3>📂 Zapisane:</h3>";

  p.forEach((plan,i)=>{
    app.innerHTML += `<div class="card"><b>Plan ${i+1}</b><br>`;
    plan.forEach(x=> app.innerHTML += x.name+"<br>");
    app.innerHTML += "</div>";
  });
}
</script>

</body>
</html>
