<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: linear-gradient(180deg,#0f172a,#020617);
  color:white;
}

/* HEADER */
.header {
  padding:15px;
  text-align:center;
}

/* INPUTY */
select, button {
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  border:none;
  font-size:16px;
}

button {
  background: linear-gradient(135deg,#38bdf8,#0ea5e9);
  color:white;
  font-weight:bold;
}

/* CONTAINER */
.container {
  max-width:420px;
  margin:auto;
  padding:10px;
}

/* MAPA */
#map {
  height:220px;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:15px;
}

/* KARTY */
.card {
  margin-top:15px;
  padding:18px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

/* NUMER */
.badge {
  width:32px;
  height:32px;
  border-radius:50%;
  background:#38bdf8;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  margin-bottom:10px;
}

/* TYTUŁ */
.title {
  font-size:17px;
  font-weight:bold;
  margin-bottom:5px;
}

/* OPIS */
.meta {
  font-size:14px;
  opacity:0.85;
  margin-top:8px;
  line-height:1.4;
}

/* MAP BUTTON */
.map-btn {
  margin-top:10px;
  display:block;
  text-align:center;
  padding:10px;
  border-radius:10px;
  background:#1e293b;
  color:#38bdf8;
  text-decoration:none;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <h2>📍 Plan dnia</h2>

  <select id="styl">
    <option value="leniwy">😴 Leniwy</option>
    <option value="aktywny">🏃 Aktywny</option>
    <option value="romantyczny">❤️ Romantyczny</option>
  </select>

  <button onclick="start()">🚀 Generuj plan</button>
</div>

<div class="container">
  <div id="map"></div>
  <div id="app"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map;
let markers = [];
let line;

function initMap() {
  if (!map) {
    map = L.map('map').setView([51.11, 17.03], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
      .addTo(map);
  }
}

function clearMap() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (line) map.removeLayer(line);
}

async function getRoute(coords) {
  const coordsStr = coords.map(c => c[1] + "," + c[0]).join(";");

  const url = "https://router.project-osrm.org/route/v1/foot/" +
              coordsStr +
              "?overview=full&geometries=geojson";

  const res = await fetch(url);
  const data = await res.json();

  if (!data.routes || !data.routes[0]) return null;

  return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
}

async function start() {
  document.getElementById("app").innerHTML = "⏳ Tworzę plan...";

  const styl = document.getElementById("styl").value;

  const res = await fetch("/plan", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ styl })
  });

  const data = await res.json();

  initMap();
  clearMap();

  let html = "";
  let hour = 10;
  let coords = [];

  data.list.forEach((item, i) => {

    const mapUrl = "https://www.google.com/maps/search/?api=1&query=" +
      encodeURIComponent(item.miejsce);

    html += `
      <div class="card">
        <div class="badge">${i+1}</div>

        <div class="title">${hour}:00 — ${item.miejsce}</div>

        <div class="meta">${item.opis}</div>

        <div class="meta">🚶 ${item.dojscie}</div>
        <div class="meta">⏱️ ${item.czas_pobytu}</div>

        <a class="map-btn" href="${mapUrl}" target="_blank">📍 Otwórz w Google Maps</a>
      </div>
    `;

    if (item.lat && item.lon) {
      coords.push([item.lat, item.lon]);

      const marker = L.marker([item.lat, item.lon])
        .addTo(map)
        .bindPopup(item.miejsce);

      markers.push(marker);
    }

    hour += 2;
  });

  if (coords.length > 1) {
    const route = await getRoute(coords);

    if (route) {
      line = L.polyline(route, { color:"#38bdf8", weight:5 }).addTo(map);
      map.fitBounds(line.getBounds());
    }
  }

  document.getElementById("app").innerHTML = html;

  setTimeout(() => {
    map.invalidateSize();
  }, 200);
}

// PWA
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}

</script>

</body>
</html>
