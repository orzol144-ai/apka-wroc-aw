<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Plan dnia</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1e1e2f,#3a2f63);
  color:white;
  display:flex;
  justify-content:center;
}

.box {
  width:95%;
  max-width:420px;
  margin-top:20px;
  background:#1f1f2e;
  padding:20px;
  border-radius:20px;
}

button, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button {
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  font-weight:bold;
}

.quick {
  display:flex;
  gap:10px;
}

.card {
  background:#2a2a3a;
  padding:15px;
  margin-top:15px;
  border-radius:15px;
  position:relative;
}

.nav {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.nav button {
  width:48%;
}
</style>
</head>

<body>

<div class="box">

<h2>📍 Plan dnia</h2>

<select id="styl">
<option value="leniwy">😴</option>
<option value="aktywny">🏃</option>
<option value="romantyczny">❤️</option>
</select>

<select id="transport">
<option value="pieszo">🚶</option>
<option value="auto">🚗</option>
</select>

<button onclick="start()">🚀 Start</button>

<div id="app"></div>

</div>

<script>

let slots = [];
let current = {};

async function start(){
  const styl = document.getElementById("styl").value;
  const transport = document.getElementById("transport").value;

  document.getElementById("app").innerHTML = "⏳ Generuję...";

  const res = await fetch("/plan",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ styl, transport })
  });

  const data = await res.json();

  parse(data.wynik);
  render();
}

// 🔥 PARSER MULTI OPCJI
function parse(text){
  slots = [];
  current = {};

  const blocks = text.split(/\n\d{2}:\d{2}/).slice(1);

  blocks.forEach((block,i)=>{
    const options = block.split("\n-").filter(x=>x.trim());
    slots.push(options);
    current[i]=0;
  });
}

// 🎯 RENDER
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "<h3>🔥 Plan dnia</h3>";

  slots.forEach((slot,i)=>{
    const txt = slot[current[i]].trim();

    const name = txt.split("–")[0] || "Miejsce";
    const map = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}`;

    app.innerHTML += `
      <div class="card">

        <button onclick="usun(this)" style="
        position:absolute;
        top:10px;
        right:10px;
        background:none;
        color:#ff6b6b;
        font-size:18px;
        border:none;">✖</button>

        <b>${name}</b><br><br>
        ${txt}<br><br>

        <a href="${map}" target="_blank">📍 Mapy</a>

        <div class="nav">
          <button onclick="prev(${i})">⬅️</button>
          <button onclick="next(${i})">➡️</button>
        </div>

      </div>
    `;
  });
}

// 👉 SWIPE
function next(i){
  if(current[i] < slots[i].length-1){
    current[i]++;
    render();
  }
}

function prev(i){
  if(current[i] > 0){
    current[i]--;
    render();
  }
}

// ❌ USUŃ
function usun(btn){
  btn.parentElement.remove();
}

</script>

</body>
</html>
